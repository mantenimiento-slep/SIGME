<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGME 2.0 - Visualizador de Programación</title>
    
    <!-- Estilo base -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Tema por defecto -->
    <link rel="stylesheet" id="theme-stylesheet" href="styles-opcion1.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div>
                <h1><i class="fas fa-school"></i> SIGME 2.0</h1>
                <p>Sistema de Gestión del Mantenimiento Escolar</p>
            </div>
            <div class="header-stats">
                <div class="stat-badge" id="totalOT">Cargando...</div>
                <div class="stat-badge" id="totalRecintos">Cargando...</div>
            </div>
        </div>
    </header>

    <main class="main-layout">
        <!-- Panel izquierdo: Filtros -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-filter"></i> Filtros</h3>
            </div>
            
            <div class="sidebar-section">
                <label for="filterLinea">Línea de Trabajo</label>
                <select id="filterLinea">
                    <option value="">Todas las líneas</option>
                </select>
            </div>
            
            <div class="sidebar-section">
                <label for="filterEstado">Estado</label>
                <select id="filterEstado">
                    <option value="">Todos los estados</option>
                </select>
            </div>
            
            <div class="sidebar-section">
                <label for="filterITO">ITO</label>
                <select id="filterITO">
                    <option value="">Todos los ITO</option>
                </select>
            </div>
            
            <div class="sidebar-section">
                <label for="filterRecinto">Establecimiento</label>
                <input type="text" id="filterRecinto" placeholder="Buscar recinto...">
            </div>
            
            <div class="sidebar-section">
                <label for="searchInput">Buscar OT</label>
                <input type="text" id="searchInput" placeholder="N° OT o palabra clave...">
            </div>
            
            <div class="sidebar-actions">
                <button class="btn-reset" onclick="resetFiltros()">
                    <i class="fas fa-undo"></i> Limpiar filtros
                </button>
            </div>
            
            <!-- Selector de Tema -->
            <div class="sidebar-section theme-selector">
                <label for="themeSelect"><i class="fas fa-palette"></i> Tema Visual</label>
                <select id="themeSelect" onchange="cambiarTema(this.value)">
                    <option value="styles-opcion1.css">🔵 Corporativo Clásico</option>
                    <option value="styles-opcion2.css">⚫ Minimalista Monocromo</option>
                    <option value="styles-opcion3.css">🟠 High Contrast</option>
                    <option value="styles-opcion4.css">🌸 Pastel Suave</option>
                    <option value="styles-opcion5.css">🌙 Dark Mode</option>
                </select>
                <div class="theme-preview" id="themePreview">
                    <div class="preview-bar" style="background: #42A5F5;"></div>
                    <div class="preview-bar" style="background: #FFA726;"></div>
                    <div class="preview-bar" style="background: #66BB6A;"></div>
                    <div class="preview-bar" style="background: #EF5350;"></div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="view-selector">
                    <button class="view-btn active" onclick="cambiarVista('gantt')">
                        <i class="fas fa-chart-gantt"></i> Gantt
                    </button>
                    <button class="view-btn" onclick="cambiarVista('tarjetas')">
                        <i class="fas fa-th-large"></i> Tarjetas
                    </button>
                </div>
            </div>
        </aside>

        <!-- Panel derecho: Contenido -->
        <section class="content">
            <div id="loadingSpinner" class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Cargando programación de mantenimiento...</p>
            </div>

            <div id="errorMessage" class="error" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i>
                <p id="errorText"></p>
            </div>

            <!-- Vista Gantt -->
            <div id="ganttView" class="gantt-container" style="display: none;">
                <div class="gantt-toolbar">
                    <div class="gantt-legend">
                        <span class="legend-item"><span class="legend-color" style="background: #42A5F5;"></span> Programada</span>
                        <span class="legend-item"><span class="legend-color" style="background: #FFA726;"></span> En Proceso</span>
                        <span class="legend-item"><span class="legend-color" style="background: #66BB6A;"></span> Completada</span>
                        <span class="legend-item"><span class="legend-color" style="background: #EF5350;"></span> Cancelada</span>
                        <span class="legend-item"><span class="legend-color" style="background: #FFE0B2; border: 1px solid #E65100;"></span> Vacaciones</span>
                        <span class="legend-item"><span class="legend-color" style="background: #FFCDD2; border: 1px solid #B71C1C;"></span> Feriado</span>
                    </div>
                    <div class="gantt-navigation">
                        <button onclick="zoomGantt(-1)" title="Zoom out"><i class="fas fa-search-minus"></i></button>
                        <button onclick="zoomGantt(1)" title="Zoom in"><i class="fas fa-search-plus"></i></button>
                        <button onclick="scrollGantt('left')" title="Anterior"><i class="fas fa-chevron-left"></i></button>
                        <button onclick="scrollGantt('today')" title="Hoy"><i class="fas fa-calendar-day"></i> Hoy</button>
                        <button onclick="scrollGantt('right')" title="Siguiente"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="gantt-chart" id="ganttChart"></div>
            </div>

            <!-- Vista Tarjetas -->
            <div id="tarjetasView" style="display: none;"></div>
        </section>
    </main>

    <footer class="footer">
        <p>SIGME 2.0 - Desarrollado para la gestión de 76 establecimientos escolares</p>
    </footer>

    <script src="gantt.js"></script>
    <script src="app.js"></script>
    
    <script>
        // Función para cambiar el tema
        function cambiarTema(tema) {
            document.getElementById('theme-stylesheet').href = tema;
            localStorage.setItem('sigme-tema', tema);
            actualizarPreviewTema(tema);
        }
        
        // Actualizar preview de colores según tema
        function actualizarPreviewTema(tema) {
            const preview = document.getElementById('themePreview');
            const barras = preview.querySelectorAll('.preview-bar');
            
            const colores = {
                'styles-opcion1.css': ['#42A5F5', '#FFA726', '#66BB6A', '#EF5350'],
                'styles-opcion2.css': ['#616161', '#9E9E9E', '#424242', '#212121'],
                'styles-opcion3.css': ['#2979FF', '#FF6D00', '#00C853', '#D50000'],
                'styles-opcion4.css': ['#BBDEFB', '#FFE0B2', '#C8E6C9', '#FFCDD2'],
                'styles-opcion5.css': ['#448AFF', '#FFAB40', '#69F0AE', '#FF5252']
            };
            
            const nuevosColores = colores[tema] || colores['styles-opcion1.css'];
            barras.forEach((barra, index) => {
                barra.style.background = nuevosColores[index];
            });
        }
        
        // Cargar tema guardado al iniciar
        window.addEventListener('DOMContentLoaded', function() {
            const temaGuardado = localStorage.getItem('sigme-tema');
            if (temaGuardado) {
                document.getElementById('themeSelect').value = temaGuardado;
                document.getElementById('theme-stylesheet').href = temaGuardado;
                actualizarPreviewTema(temaGuardado);
            }
        });
    </script>
</body>
</html>
